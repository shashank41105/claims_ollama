<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ClaimTrackr</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Exclusion Management</h1>
            <a href="/" class="text-blue-500 hover:text-blue-700">← Back to Claims</a>
        </div>
        
        <!-- Add New Exclusion -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Add New Exclusion</h2>
            <form id="addForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Exclusion Name *</label>
                    <input type="text" name="name" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        placeholder="e.g., Cosmetic Surgery">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea name="description" rows="3"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        placeholder="Detailed description of what is excluded..."></textarea>
                </div>
                <button type="submit" 
                    class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                    Add Exclusion
                </button>
            </form>
            <div id="message" class="mt-4 hidden"></div>
        </div>
        
        <!-- Exclusions List -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">Current Exclusions</h2>
            </div>
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    {% for ex in exclusions %}
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ ex.name }}</td>
                        <td class="px-6 py-4 text-sm text-gray-500">{{ ex.description or '-' }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick="deleteExclusion('{{ ex.id }}')" 
                                class="text-red-600 hover:text-red-900 transition-colors">
                                Delete
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% if not exclusions %}
            <div class="px-6 py-8 text-center text-gray-500">
                No exclusions found. Add one above.
            </div>
            {% endif %}
        </div>
    </div>

    <script>
        // Add exclusion
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const msgDiv = document.getElementById('message');
            
            try {
                const res = await fetch('/admin/exclusions', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    msgDiv.className = 'mt-4 p-4 bg-green-50 text-green-700 rounded-lg';
                    msgDiv.textContent = 'Exclusion added successfully!';
                    msgDiv.classList.remove('hidden');
                    setTimeout(() => location.reload(), 1000);
                } else {
                    throw new Error(data.error || 'Failed to add');
                }
            } catch (err) {
                msgDiv.className = 'mt-4 p-4 bg-red-50 text-red-700 rounded-lg';
                msgDiv.textContent = 'Error: ' + err.message;
                msgDiv.classList.remove('hidden');
            }
        });

        // Delete exclusion
        async function deleteExclusion(id) {
            if (!confirm('Are you sure you want to delete this exclusion?')) return;
            
            try {
                const res = await fetch(`/admin/exclusions/${id}`, {
                    method: 'DELETE'
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    location.reload();
                } else {
                    alert('Error: ' + (data.error || 'Failed to delete'));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
    </script>
</body>
</html>
